services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: app_shoe_shop
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: queue_shoe_shop
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - .:/var/www
    depends_on:
      - db
      - app
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: db_shoe_shop
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shoe_shop
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_shoe_shop
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
      UPLOAD_LIMIT: 300M
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_shoe_shop
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # ===== Rasa server =====
  rasa:
    image: rasa/rasa-pro:3.13.4
    container_name: rasa_shoe_shop
    working_dir: /bot
    volumes:
      - ./rasa:/bot
    entrypoint: []
    command: >
      rasa run --enable-api --cors "*" --port 5005 --endpoints /bot/endpoints.yml
    environment:
      - RASA_PRO_LICENSE=${RASA_PRO_LICENSE}
    ports:
      - "5005:5005"
    depends_on:
      - rasa-actions
    networks:
      - app-network

  # ===== Rasa action server =====
  rasa-actions:
    image: rasa/rasa-sdk:3.13.0
    container_name: rasa_actions_shoe_shop
    working_dir: /app
    volumes:
      - ./rasa/actions:/app/actions
    depends_on:
      - app
    networks:
      - app-network
    command: start --actions actions --port 5055   
    ports:
      - "5055:5055"
    environment:
      - SHOP_API_BASE_URL=http://nginx
      - SHOP_WEB_BASE_URL=http://localhost:8080

networks:
  app-network:
    driver: bridge

volumes:
  db-data: