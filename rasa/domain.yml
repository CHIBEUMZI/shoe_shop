slots:
  brand:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: brand
        conditions:
          - active_loop: null
  purpose:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: shoe_recommendation_form
            requested_slot: purpose
  shoe_size:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: shoe_recommendation_form
            requested_slot: shoe_size
  price_range:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: shoe_recommendation_form
            requested_slot: price_range
  occasion:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: occasion
      - type: from_text
        conditions:
          - active_loop: null
  gift_occasion:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: gift_occasion
      - type: from_text
        conditions:
          - active_loop: gift_recommendation_form
            requested_slot: gift_occasion
  recipient_gender:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: recipient_gender
      - type: from_text
        conditions:
          - active_loop: gift_recommendation_form
            requested_slot: recipient_gender
  gift_shoe_size:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: gift_recommendation_form
            requested_slot: gift_shoe_size
  gift_price_range:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: gift_recommendation_form
            requested_slot: gift_price_range

forms:
  shoe_recommendation_form:
    required_slots:
      - purpose
      - shoe_size
      - price_range
  gift_recommendation_form:
    required_slots:
      - gift_occasion
      - recipient_gender
      - gift_shoe_size
      - gift_price_range

responses:
  utter_greet:
    - text: "Chào bạn! Mình là trợ lý giày của BMC Shoes 👟 Rất vui được tư vấn cho bạn! Bạn đang cần tìm giày để làm gì vậy? (đi làm, chạy bộ, đá bóng, đi chơi...)"
  utter_occasion_search:
    - text: "Để mình tìm giày phù hợp cho bạn nhé! Trước tiên, bạn cần giày để làm gì?"
  utter_ask_purpose:
    - text: "Bạn muốn tìm giày để làm gì? Ví dụ: chạy bộ, đá bóng, đi làm, đi học, đi chơi, du lịch, tập gym, hay đi tiệc..."
  utter_ask_shoe_size:
    - text: "Bạn thường mang size giày bao nhiêu? Nếu không biết, bạn có thể đo chiều dài bàn chân (cm) và mình sẽ tư vấn size phù hợp nhé!"
  utter_ask_price_range:
    - text: "Bạn mong muốn tầm giá khoảng bao nhiêu? Ví dụ: dưới 500k, 500k-1 triệu, 1-2 triệu, 2-3 triệu, hoặc trên 3 triệu?"
  utter_ask_gift_occasion:
    - text: "Bạn tặng giày cho người yêu nhân dịp gì vậy? Ví dụ: sinh nhật, kỷ niệm ngày yêu, Valentine, hay một dịp đặc biệt nào khác?"
  utter_ask_recipient_gender:
    - text: "Người nhận quà là nam hay nữ vậy bạn?"
  utter_ask_gift_shoe_size:
    - text: "Bạn biết size giày của người nhận quà không? Nếu không biết, bạn có thể ước lượng hoặc mình sẽ gợi ý size phổ biến nhé!"
  utter_ask_gift_price_range:
    - text: "Bạn dự định ngân sách cho đôi giày là bao nhiêu? Ví dụ: dưới 1 triệu, 1-2 triệu, 2-3 triệu, hoặc trên 3 triệu?"
  utter_promotion:
    - text: "Hiện shop đang có nhiều ưu đãi hấp dẫn! Bạn cho mình biết bạn cần giày loại nào và tầm giá bao nhiêu, mình sẽ tìm sản phẩm đang giảm giá phù hợp cho bạn nhé!"
  utter_shipping:
    - text: "Shop giao hàng toàn quốc, freeship cho đơn từ 500k! Bạn ở khu vực nào để mình ước tính phí ship và thời gian giao hàng nhé."
  utter_payment:
    - text: "Shop hỗ trợ nhiều hình thức thanh toán: COD (nhận hàng rồi trả tiền), chuyển khoản, và thanh toán online qua Momo, ZaloPay, VNPay. Bạn thích thanh toán cách nào?"
  utter_return_policy:
    - text: "Shop đổi size/đổi mẫu miễn phí trong 7 ngày nếu sản phẩm còn nguyên tem mác và chưa qua sử dụng. Bạn cần đổi size hay muốn trả hàng?"
  utter_store_info:
    - text: "Cửa hàng BMC Shoes mở cửa từ 8h-21h các ngày trong tuần. Bạn muốn biết địa chỉ cụ thể hay liên hệ hỗ trợ?"
  utter_goodbye:
    - text: "Cảm ơn bạn đã trò chuyện cùng BMC Shoes! Nếu cần tư vấn thêm về giày, cứ nhắn mình nhé. Chúc bạn tìm được đôi giày ưng ý! 👟"
  utter_default:
    - text: "Mình chưa hiểu rõ ý bạn 😅 Bạn có thể nói rõ hơn không? Ví dụ: bạn cần giày để làm gì, thương hiệu nào, hay tầm giá bao nhiêu?"
  utter_continue:
    - text: "Bạn muốn mình gợi ý thêm sản phẩm khác không? Hay bạn muốn lọc theo tiêu chí khác (size, giá, thương hiệu)?"
  utter_stop:
    - text: "Không sao cả! Nếu bạn cần hỗ trợ gì thêm về giày, cứ nhắn mình nhé. Mình luôn sẵn sàng giúp bạn! 👟"

actions:
  - validate_shoe_recommendation_form
